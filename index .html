<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編み物記録 - 改良版</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f9; padding-bottom: 80px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: auto; border-radius: 8px; margin-top: 10px; }
        input, select, textarea { padding: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
        .btn { padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; }
        .save-btn { background: #28a745; width: 100%; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #007bff; color: white; border-radius: 50%; font-size: 30px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <section id="home" class="tab-content active">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>作品一覧</h2>
            <button onclick="showTab('config')">⚙️</button>
        </div>
        <select id="filterCategory" onchange="loadData()">
            <option value="全カテゴリー">全カテゴリー</option>
        </select>
        <div id="list"></div>
        <button class="fab" onclick="resetForm()">+</button>
    </section>

    <section id="add" class="tab-content">
        <h2 id="formTitle">新規追加</h2>
        <form id="knitForm">
            <input type="text" id="title" placeholder="作品名" required>
            <select id="categorySelect"></select>
            <input type="date" id="startDate" required>
            <textarea id="memo" placeholder="メモ"></textarea>
            <button type="submit" class="btn save-btn">保存する</button>
            <button type="button" class="btn" style="background:#6c757d; width:100%; margin-top:10px;" onclick="showTab('home')">戻る</button>
        </form>
    </section>

    <section id="config" class="tab-content">
        <h2>設定</h2>
        <button class="btn" style="background:#17a2b8; width:100%;" onclick="exportCSV()">データをCSVで保存</button>
        <button class="btn" style="background:#6c757d; width:100%; margin-top:20px;" onclick="showTab('home')">一覧に戻る</button>
    </section>

    <script>
        let knits = JSON.parse(localStorage.getItem('knits') || '[]');
        let categories = JSON.parse(localStorage.getItem('categories') || '["未分類", "小物", "ウェア"]');

        function updateUI() {
            // カテゴリー選択肢を更新
            const options = ['全カテゴリー', ...categories].map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('filterCategory').innerHTML = options;
            document.getElementById('categorySelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            loadData();
        }

        function loadData() {
            const filter = document.getElementById('filterCategory').value;
            const listDiv = document.getElementById('list');
            let html = "";
            
            // 絞り込み判定
            const filtered = (filter === "全カテゴリー") ? knits : knits.filter(k => k.category === filter);
            
            filtered.forEach((item, index) => {
                html += `<div class="card"><strong>${item.title}</strong><br><small>${item.category}</small></div>`;
            });
            listDiv.innerHTML = html || '<p>記録がありません</p>';
        }

        function exportCSV() {
            let csv = "作品名,カテゴリー,開始日,メモ\n";
            knits.forEach(k => { csv += `"${k.title}","${k.category}","${k.startDate}","${k.memo}"\n`; });
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "knits_backup.csv"; a.click();
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function resetForm() { showTab('add'); }

        updateUI();
    </script>
</body>
</html>
