<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編み物記録</title>
    <link rel="apple-touch-icon" href="k.image.jpg">
    
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Zen Maru Gothic', sans-serif; background-color: #fdfaf5; color: #5d554d; padding-bottom: 100px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        
        /* カードデザイン（写真サイズを小さく） */
        .card { background: #ffffff; margin: 10px 0; padding: 10px; border-radius: 15px; border: 1px solid #efeae3; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .card img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-right: 12px; }
        .details { display: none; background: #fffdfa; padding: 15px; border-radius: 0 0 15px 15px; margin: -10px 5px 15px 5px; border: 1px solid #efeae3; border-top: none; }
        
        .btn { background: #8aa9c6; color: white; border-radius: 20px; border: none; padding: 8px 16px; font-weight: bold; cursor: pointer; }
        .more-btn { display: block; width: 100%; margin: 10px 0; background: #eee; color: #555; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #6a9ac2; color: white; border-radius: 50%; border: none; font-size: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        
        input, select, textarea { padding: 12px; margin-bottom: 10px; width: 100%; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .section-title { font-size: 1.1rem; color: #8b796d; margin-top: 25px; margin-bottom: 5px; border-left: 4px solid #dcd3c9; padding-left: 10px; }
    </style>
</head>
<body>

    <section id="home" class="tab-content active">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>作品リスト</h2>
            <button onclick="showTab('config')" style="background:none; border:none; font-size:24px;">⚙️</button>
        </div>
        <select id="filterCategory" onchange="loadData()"><option value="全カテゴリー">全カテゴリー</option></select>
        
        <div class="section-title">制作中 🧶</div>
        <div id="list-working"></div>
        <button id="more-working" class="btn more-btn" style="display:none;" onclick="showMore('working')">もっと見る</button>
        
        <div class="section-title">完成品 🧶</div>
        <div id="list-completed"></div>
        <button id="more-completed" class="btn more-btn" style="display:none;" onclick="showMore('completed')">もっと見る</button>

        <button class="fab" onclick="prepareAdd()">+</button>
    </section>

    <section id="add" class="tab-content">
        <h2>追加・編集</h2>
        <form id="knitForm">
            <input type="text" id="title" placeholder="作品名" required>
            <select id="categorySelect"></select>
            <input type="text" id="purpose" placeholder="目的">
            <input type="text" id="materials" placeholder="材料">
            <label>開始日</label><input type="date" id="startDate" required>
            <label>完了日</label><input type="date" id="endDate">
            <input type="file" id="photo" accept="image/*">
            <textarea id="memo" placeholder="メモ"></textarea>
            <button type="submit" class="btn" style="width:100%;">保存する</button>
            <button type="button" class="btn" style="background:#a9a9a9; width:100%; margin-top:10px;" onclick="showTab('home')">戻る</button>
        </form>
    </section>

    <section id="config" class="tab-content">
        <h2>カテゴリー設定</h2>
        <input type="text" id="newCat" placeholder="新規カテゴリー">
        <button class="btn" onclick="addCategory()">追加</button>
        <div id="catList" style="margin-top:20px;"></div>
        <button class="btn" style="background:#a9a9a9; margin-top:20px;" onclick="showTab('home')">戻る</button>
    </section>

    <script>
        let knits = JSON.parse(localStorage.getItem('knits') || '[]');
        let categories = JSON.parse(localStorage.getItem('categories') || '["未分類", "小物", "ウェア"]');
        let editIndex = -1;

        function loadData() {
            const filter = document.getElementById('filterCategory').value;
            const filtered = (filter === "全カテゴリー") ? knits : knits.filter(k => k.category === filter);
            renderList('working', filtered.filter(k => !k.endDate));
            renderList('completed', filtered.filter(k => k.endDate));
        }

        function renderList(type, data) {
            const container = document.getElementById(`list-${type}`);
            container.innerHTML = "";
            data.forEach((k, i) => {
                const originalIndex = knits.indexOf(k);
                const displayStyle = i >= 3 ? 'display:none;' : '';
                container.innerHTML += `
                <div class="card item-${type}" style="${displayStyle}">
                    ${k.image ? `<img src="${k.image}">` : '<div style="width:50px; height:50px; background:#eee; margin-right:12px; border-radius:8px;"></div>'}
                    <div style="flex-grow:1;"><strong>${k.title}</strong><br><small>${k.category}</small></div>
                    <button class="btn" onclick="toggleDetails(${originalIndex})">詳細</button>
                </div>
                <div id="details-${originalIndex}" class="details">
                    <p>目的: ${k.purpose}<br>材料: ${k.materials}<br>期間: ${k.startDate} ～ ${k.endDate || "..."}</p>
                    <button class="btn" style="background:#ffc107;" onclick="editItem(${originalIndex})">編集</button>
                </div>`;
            });
            document.getElementById(`more-${type}`).style.display = data.length > 3 ? 'block' : 'none';
        }

        function showMore(type) {
            document.querySelectorAll(`.item-${type}`).forEach(el => el.style.display = 'flex');
            document.getElementById(`more-${type}`).style.display = 'none';
        }

        function toggleDetails(i) { const el = document.getElementById(`details-${i}`); el.style.display = (el.style.display === 'block') ? 'none' : 'block'; }
        
        document.getElementById('knitForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const file = document.getElementById('photo').files[0];
            const save = (imgData) => {
                const item = { title:document.getElementById('title').value, category:document.getElementById('categorySelect').value, purpose:document.getElementById('purpose').value, materials:document.getElementById('materials').value, startDate:document.getElementById('startDate').value, endDate:document.getElementById('endDate').value, memo:document.getElementById('memo').value, image: imgData || knits[editIndex]?.image };
                if(editIndex !== -1) knits[editIndex] = item; else knits.push(item);
                localStorage.setItem('knits', JSON.stringify(knits));
                showTab('home'); updateUI();
            };
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 200; canvas.height = 200 * (img.height / img.width);
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        save(canvas.toDataURL('image/jpeg', 0.5));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            } else save();
        });

        function editItem(i) { editIndex = i; const k = knits[i]; document.getElementById('title').value=k.title; document.getElementById('categorySelect').value=k.category; document.getElementById('purpose').value=k.purpose; document.getElementById('materials').value=k.materials; document.getElementById('startDate').value=k.startDate; document.getElementById('endDate').value=k.endDate; document.getElementById('memo').value=k.memo; showTab('add'); }
        function prepareAdd() { editIndex = -1; document.getElementById('knitForm').reset(); showTab('add'); }
        function showTab(id) { document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function updateUI() {
            document.getElementById('categorySelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('filterCategory').innerHTML = ['全カテゴリー', ...categories].map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catList').innerHTML = categories.map((c, i) => `<div style="margin-bottom:10px;">${c} ${i>0 ? `<button class="btn" style="background:#e74c3c; padding:4px 8px;" onclick="deleteCategory(${i})">削除</button>` : ''}</div>`).join('');
            loadData();
        }
        function addCategory() { const val = document.getElementById('newCat').value.trim(); if(val && !categories.includes(val)) { categories.push(val); localStorage.setItem('categories', JSON.stringify(categories)); updateUI(); } }
        function deleteCategory(i) { categories.splice(i, 1); localStorage.setItem('categories', JSON.stringify(categories)); updateUI(); }
        
        updateUI();
    </script>
</body>
</html>
