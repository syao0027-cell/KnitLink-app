<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>編み物記録</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f9; padding-bottom: 20px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .settings-btn { position: fixed; top: 15px; right: 15px; font-size: 28px; cursor: pointer; background: none; border: none; z-index: 100; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #007bff; color: white; border-radius: 50%; font-size: 30px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.3); z-index: 100; }
        .stats { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 0.9em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        /* 折りたたみスタイルの調整 */
        details { background: white; margin-bottom: 10px; border-radius: 12px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        summary { font-weight: bold; padding: 10px; cursor: pointer; outline: none; }
        .category-group { margin-left: 15px; border-left: 2px solid #e0e0e0; padding-left: 10px; }
        
        .card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .card img { width: 100%; height: auto; border-radius: 8px; margin-top: 10px; }
        .btn-group-card { margin-top: 10px; display: flex; gap: 5px; }
        .edit-btn { background: #ffc107; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .delete-btn { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        input, select, textarea { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .save-btn { background: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-size: 16px; }
        .back-btn { background: #6c757d; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; margin-top: 10px; font-size: 16px; }
    </style>
</head>
<body>

    <section id="home" class="tab-content active">
        <button class="settings-btn" onclick="showTab('config')">⚙️</button>
        <h2>作品一覧</h2>
        <div id="stats" class="stats"></div>
        <div id="list"></div>
        <button class="fab" onclick="resetForm()">+</button>
    </section>

    <script>
        // ... (以前の変数定義や addCategory 等の関数はそのまま) ...

        function loadData() {
            const listDiv = document.getElementById('list');
            const statuses = [
                { title: "制作中", filter: k => !k.endDate },
                { title: "完成済み", filter: k => k.endDate }
            ];

            let html = "";
            statuses.forEach(status => {
                const itemsInStatus = knits.filter(status.filter);
                if (itemsInStatus.length === 0) return;

                html += `<details open><summary>${status.title} (${itemsInStatus.length})</summary>`;
                
                categories.forEach(cat => {
                    const filtered = itemsInStatus.filter(k => k.category === cat);
                    if (filtered.length > 0) {
                        html += `<div class="category-group"><h4>${cat}</h4>`;
                        filtered.forEach(item => {
                            const index = knits.indexOf(item);
                            html += `<div class="card">
                                <strong>${item.title}</strong><br>
                                <small>開始: ${item.startDate} ${item.endDate ? ' / 完了: ' + item.endDate : ''}</small><br>
                                <div class="btn-group-card">
                                    <button class="edit-btn" onclick="editItem(${index})">編集</button>
                                    <button class="delete-btn" onclick="deleteItem(${index})">削除</button>
                                </div>
                            </div>`;
                        });
                        html += `</div>`;
                    }
                });
                html += `</details>`;
            });
            listDiv.innerHTML = html || '<p>まだ記録がありません</p>';
        }

        // ... (以下、save や editItem などのロジックは以前の完全版のものをそのまま使用) ...
        updateUI();
    </script>
</body>
</html>
