<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編み物管理</title>
    <style>
        body { margin: 0; padding-bottom: 70px; font-family: sans-serif; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; display: flex; justify-content: space-around; background: #eee; border-top: 1px solid #ccc; }
        .bottom-nav button { flex: 1; border: none; background: none; font-size: 16px; }
        form { display: flex; flex-direction: column; gap: 10px; }
        .card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <section id="home" class="tab-content active">
        <h2>作品一覧</h2>
        <div id="list"></div>
    </section>

    <section id="add" class="tab-content">
        <h2>新規追加</h2>
        <form id="knitForm">
            <input type="text" id="title" placeholder="作品名" required>
            <input type="date" id="date" required>
            <button type="submit">保存する</button>
        </form>
    </section>

    <nav class="bottom-nav">
        <button onclick="showTab('home')">一覧</button>
        <button onclick="showTab('add')">追加</button>
    </nav>

    <script>
        const form = document.getElementById('knitForm');
        const listDiv = document.getElementById('list');

        // 保存されたデータを読み込んで表示
        function loadData() {
            const data = JSON.parse(localStorage.getItem('knits') || '[]');
            listDiv.innerHTML = data.map(item => `
                <div class="card">
                    <strong>${item.title}</strong><br>開始日: ${item.date}
                </div>
            `).join('');
        }

        // 保存処理
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const newData = { title: document.getElementById('title').value, date: document.getElementById('date').value };
            const data = JSON.parse(localStorage.getItem('knits') || '[]');
            data.push(newData);
            localStorage.setItem('knits', JSON.stringify(data));
            form.reset();
            loadData();
            showTab('home');
        });

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        loadData(); // 初回読み込み
    </script>
</body>
</html>
