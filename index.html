<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編み物記録</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #f4f4f9; padding-bottom: 80px; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: auto; border-radius: 8px; margin-top: 10px; }
        input, select, textarea { padding: 12px; margin-bottom: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
        .btn { padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; width: 100%; }
        .save-btn { background: #28a745; }
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: #007bff; color: white; border-radius: 50%; font-size: 30px; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        .status-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; color: white; margin-bottom: 5px; }
    </style>
</head>
<body>

    <section id="home" class="tab-content active">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>作品一覧</h2>
            <button onclick="showTab('config')" style="background:none; border:none; font-size:24px;">⚙️</button>
        </div>
        <select id="filterCategory" onchange="loadData()"><option value="全カテゴリー">全カテゴリー</option></select>
        <div id="list"></div>
        <button class="fab" onclick="prepareAdd()">+</button>
    </section>

    <section id="add" class="tab-content">
        <h2 id="formTitle">新規追加</h2>
        <form id="knitForm">
            <input type="text" id="title" placeholder="作品名" required>
            <select id="categorySelect"></select>
            <input type="text" id="purpose" placeholder="目的（誰に渡すか等）">
            <input type="text" id="materials" placeholder="使用した材料">
            <label>開始日</label><input type="date" id="startDate" required>
            <label>完了日（未入力なら制作中）</label><input type="date" id="endDate">
            <input type="file" id="photo" accept="image/*">
            <textarea id="memo" placeholder="メモ"></textarea>
            <button type="submit" class="btn save-btn">保存する</button>
            <button type="button" class="btn" style="background:#6c757d; margin-top:10px;" onclick="showTab('home')">戻る</button>
        </form>
    </section>

    <section id="config" class="tab-content">
        <h2>カテゴリー設定</h2>
        <input type="text" id="newCat" placeholder="新しいカテゴリー名">
        <button class="btn" style="background:#007bff;" onclick="addCategory()">追加</button>
        <div id="catList" style="margin-top:20px;"></div>
        <button class="btn" style="background:#6c757d; margin-top:20px;" onclick="showTab('home')">一覧に戻る</button>
    </section>

    <script>
        let knits = JSON.parse(localStorage.getItem('knits') || '[]');
        let categories = JSON.parse(localStorage.getItem('categories') || '["未分類", "小物", "ウェア"]');
        let editIndex = -1;

        function updateUI() {
            const options = ['全カテゴリー', ...categories].map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('filterCategory').innerHTML = options;
            document.getElementById('categorySelect').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('catList').innerHTML = categories.map((c, i) => `
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">${c}
                ${i>0 ? `<button onclick="deleteCategory(${i})">削除</button>` : ''}</div>`).join('');
            loadData();
        }

        function prepareAdd() { editIndex = -1; document.getElementById('knitForm').reset(); document.getElementById('formTitle').innerText = "新規追加"; showTab('add'); }
        
        function editItem(index) {
            editIndex = index;
            const k = knits[index];
            document.getElementById('title').value = k.title;
            document.getElementById('categorySelect').value = k.category;
            document.getElementById('purpose').value = k.purpose;
            document.getElementById('materials').value = k.materials;
            document.getElementById('startDate').value = k.startDate;
            document.getElementById('endDate').value = k.endDate;
            document.getElementById('memo').value = k.memo;
            document.getElementById('formTitle').innerText = "編集";
            showTab('add');
        }

        document.getElementById('knitForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const file = document.getElementById('photo').files[0];
            const save = (imgData) => {
                const item = {
                    title: document.getElementById('title').value,
                    category: document.getElementById('categorySelect').value,
                    purpose: document.getElementById('purpose').value,
                    materials: document.getElementById('materials').value,
                    startDate: document.getElementById('startDate').value,
                    endDate: document.getElementById('endDate').value,
                    memo: document.getElementById('memo').value,
                    image: imgData || (editIndex !== -1 ? knits[editIndex].image : null)
                };
                if (editIndex !== -1) knits[editIndex] = item; else knits.push(item);
                localStorage.setItem('knits', JSON.stringify(knits));
                loadData();
                showTab('home');
            };
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale =
